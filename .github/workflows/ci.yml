name: CI

on:
  push:
    branches: [main, clean-main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ruff (lint only, no format churn)
        run: |
          pip install ruff
          ruff check .

      - name: Dependency-light test suites
        run: |
          pip install fastapi sse-starlette python-dotenv
          python phase-1/test_runtime_contract.py
          python phase-1/test_cultural_core.py
          python phase-9/test_project_tasks.py
          python phase-9/test_learning_workspace.py
          python phase-1/test_teach_flow_guardrails.py
          python phase-9/test_skills.py

      - name: Full suite (pytest, best-effort while deps stabilise)
        continue-on-error: true
        run: |
          pip install -e .[dev]
          pytest
