<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandelbrot Zoom Animation</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;color:#e0d8c8;padding:2rem}
  h1{font-size:1.6rem;margin-bottom:0.5rem;background:linear-gradient(90deg,#a855f7,#06b6d4,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  p{color:#888;margin-bottom:1.5rem;font-size:0.9rem}
  .card{background:#111118;border:1px solid #222;border-radius:16px;padding:1.5rem;max-width:800px;width:100%}
  video{width:100%;border-radius:10px;display:block}
  .info{margin-top:1rem;display:flex;gap:1rem;font-size:0.85rem;color:#666;flex-wrap:wrap}
  .info span{background:#1a1a25;padding:0.25rem 0.75rem;border-radius:20px}
  a{color:#06b6d4;text-decoration:none}
  a:hover{text-decoration:underline}
  .download{margin-top:1rem;text-align:center}
  .download a{display:inline-block;background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:0.6rem 1.5rem;color:#e0d8c8;font-size:0.9rem}
  .download a:hover{background:#2a2a3e}
</style>
</head>
<body>
  <div class="card">
    <h1>🐚 Mandelbrot Zoom</h1>
    <p>30-frame generative zoom into the seahorse valley &mdash; dark neon palette</p>
    <video controls autoplay loop muted playsinline>
      <source src="/media/video.mp4" type="video/mp4">
    </video>
    <div class="info">
      <span>960&times;544</span>
      <span>24 fps</span>
      <span>15&times; zoom</span>
      <span>120 iterations</span>
      <span>~1.6 MB</span>
    </div>
    <div class="download">
      <a href="/media/video.mp4" download>&#9660; Download MP4</a>
    </div>
  </div>
</body>
</html>
