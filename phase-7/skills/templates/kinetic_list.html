<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE|Key Points}}</title>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg:     {{BG_COLOR|#fafafa}};
    --card:   {{CARD_COLOR|#ffffff}};
    --text:   {{TEXT_COLOR|#111827}};
    --accent: {{ACCENT_COLOR|#4f46e5}};
    --muted:  {{MUTED_COLOR|#6b7280}};
    --border: {{BORDER_COLOR|#e5e7eb}};
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
  }

  .wrapper { max-width: 680px; width: 100%; }

  .header {
    margin-bottom: 3rem;
    opacity: 0;
    transform: translateY(24px);
  }
  .eyebrow {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  h1 {
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    color: var(--text);
  }
  .subtitle {
    font-size: 1rem;
    color: var(--muted);
    margin-top: 0.6rem;
    line-height: 1.5;
  }

  /* List */
  .item {
    display: flex;
    align-items: flex-start;
    gap: 1.2rem;
    padding: 1.4rem 1.6rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 0.75rem;
    opacity: 0;
    transform: translateX(-40px);
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    transition: box-shadow 0.2s;
  }
  .item:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .item-number {
    flex-shrink: 0;
    width: 2rem; height: 2rem;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 0.8rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .item-body { flex: 1; min-width: 0; }
  .item-title {
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 0.25rem;
    line-height: 1.3;
  }
  .item-desc {
    font-size: 0.875rem;
    color: var(--muted);
    line-height: 1.55;
  }
  .item-tag {
    flex-shrink: 0;
    padding: 0.2em 0.7em;
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    color: var(--accent);
    border-radius: 100px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    align-self: center;
  }

  /* Progress bar at top */
  .progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s ease;
  }

  /* Replay button */
  .replay {
    margin-top: 2rem;
    text-align: center;
    opacity: 0;
  }
  .replay button {
    padding: 0.6em 1.8em;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 100px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s;
  }
  .replay button:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="progress-bar" id="prog"></div>
<div class="wrapper">
  <div class="header" id="header">
    <div class="eyebrow">{{EYEBROW|Key Takeaways}}</div>
    <h1>{{TITLE|Five Things to Know}}</h1>
    <p class="subtitle">{{SUBTITLE|Each point builds on the last — take a moment with each one.}}</p>
  </div>

  <div id="list">
    <!-- Items injected by JS from data below -->
  </div>
  <div class="replay" id="replay">
    <button onclick="animate()">Replay</button>
  </div>
</div>

<script>
const ITEMS = {{ITEMS|[
  {"title": "First Principle", "desc": "Start from fundamentals, not analogies. The clearest thinkers rebuild from the ground up.", "tag": "Foundation"},
  {"title": "Second Order Effects", "desc": "Every decision has downstream consequences. Ask what happens next, and then what happens after that.", "tag": "Strategy"},
  {"title": "The Minimum Viable Insight", "desc": "Compress your understanding to its smallest expressible form. If you can't state it in one sentence, you don't understand it yet.", "tag": "Clarity"},
  {"title": "Build Feedback Loops", "desc": "Short cycles beat long cycles. The faster you learn whether you're right, the faster you improve.", "tag": "Systems"},
  {"title": "Ship the Work", "desc": "Execution separates ideas from outcomes. Imperfect and shipped beats perfect and postponed.", "tag": "Action"}
]}};

const list = document.getElementById('list');
const prog = document.getElementById('prog');

ITEMS.forEach((item, i) => {
  const el = document.createElement('div');
  el.className = 'item';
  el.innerHTML = `
    <div class="item-number">${String(i+1).padStart(2,'0')}</div>
    <div class="item-body">
      <div class="item-title">${item.title}</div>
      <div class="item-desc">${item.desc}</div>
    </div>
    ${item.tag ? `<div class="item-tag">${item.tag}</div>` : ''}
  `;
  list.appendChild(el);
});

function animate() {
  const header = document.getElementById('header');
  const items  = document.querySelectorAll('.item');
  const replay = document.getElementById('replay');

  // Reset
  gsap.set([header, ...items, replay], { opacity: 0, x: 0, y: 24 });
  gsap.set(items, { x: -40, y: 0 });
  prog.style.width = '0%';

  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

  tl.to(header, { opacity: 1, y: 0, duration: 0.7 });
  items.forEach((el, i) => {
    tl.to(el, { opacity: 1, x: 0, duration: 0.55 }, i === 0 ? '+=0.1' : '-=0.3');
    tl.to(prog, { width: ((i + 1) / items.length * 100) + '%', duration: 0.3 }, '<');
  });
  tl.to(replay, { opacity: 1, y: 0, duration: 0.4 }, '+=0.2');
}

window.addEventListener('load', () => setTimeout(animate, 300));
</script>
</body>
</html>
